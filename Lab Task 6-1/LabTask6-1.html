<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .block{
            display: block;
            padding: 1px;
        }
        span > input{
            border: 1px solid gray;
            border-radius: 3px;
            width: 200px;
        }
        .inblock{
            display: inline-block;
            width: 200px;
            vertical-align: middle;
            background-color: rgb(255, 255, 255);
            padding: 5px;
        }
        .quest{    
            display: inline-block;
            vertical-align: middle;
        }
       

    </style>
</head>
<body>
    <h3>#1</h3>
    <div>
        <span class="block"><input type="text" name="" id="" placeholder="Name"></span>
        <span class="block"><input type="text" name="" id="" placeholder="Email"></span>
    </div>

   <br>
   <hr>
   <br>

   <h3>#2</h3>

    <div> 
        <p class="inblock">Have you ever confidently said “I'll start tomorrow,” knowing damn well tomorrow has been rescheduled at least 47 times?</p>
        <button class="quest">YES</button> 
        <button class="quest">NO</button>
    </div>

     <br>
   <hr>
   <br>

   <img src="images/google.webp" width="300px%" class="block" style="margin: auto; padding: 10px;">
   <input type="text" name="" id="" placeholder="Search Google or type a URL" class="block" style="width: 500px; margin: auto; padding: 5px; border-radius: 50px;" >

    
    
   

    






    </body>
   
</html>
